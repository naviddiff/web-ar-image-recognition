<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AR App - Custom Assets</title>
    <!-- 1. The AR Engines (A-Frame + Mind-AR) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #instruction {
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 10px;
            font-family: sans-serif; z-index: 100; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="instruction">Scan your <b>Target Image</b> to see the 3D Model</div>

    <a-scene 
        /* 
           HOW TO SET YOUR TARGET IMAGE:
           1. Go to: https://hiukim.github.io/mind-ar-js-doc/tools/compile
           2. Upload your image (jpg/png) and click 'Compile'.
           3. Download the '.mind' file and put it in your 'assets' folder.
           4. Change 'card.mind' below to your filename!
        */
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            /* 
               HOW TO PLACE YOUR 3D MODELS:
               1. Get a .gltf or .glb file (standard for AR).
               2. Place it in your 'assets' folder.
               3. Change the 'src' below to your file path.
            */
            <a-asset-item id="myModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/softbar/scene.gltf"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Use 'targetIndex: 0' for the first image in your .mind file -->
        <a-entity mindar-image-target="targetIndex: 0">
            
            <!-- THIS IS WHERE YOU ARRANGE YOUR OBJECTS -->
            <a-entity 
                gltf-model="#myModel" 
                rotation="0 0 0" 
                position="0 0 0.1" 
                scale="0.01 0.01 0.01"
                animation="property: rotation; to: 0 360 0; dur: 10000; loop: true; easing: linear">
            </a-entity>

            <!-- You can add simple objects too! -->
            <a-text value="MODEL LOADED" position="0 0.5 0" align="center" color="#6366f1"></a-text>

        </a-entity>
        
    </a-scene>
</body>
</html>
