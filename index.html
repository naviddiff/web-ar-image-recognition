<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple QR-AR</title>
    <!-- Simple AR.js library -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ui {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
        border-radius: 50px; font-family: sans-serif; z-index: 10;
        text-align: center; border: 2px solid #6366f1;
      }
    </style>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="ui">Point camera at the <b>HIRO</b> marker</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <!-- This is the 'Target' (Hiro Marker) -->
      <a-marker preset="hiro">
        
        <!-- 3D Content -->
        <a-box position='0 0.5 0' material='color: #6366f1; opacity: 0.8;' animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
        
        <a-text value="AR WORKING!" position="0 1.2 0" align="center" color="#fff" width="4"></a-text>
        
        <!-- Floating Info -->
        <a-entity position="0 0.5 0" geometry="primitive: plane; width: 1.5; height: 0.5" material="color: black; opacity: 0.5" text="value: Mobile AR Active; align: center;"></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
