<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Web-AR Experience</title>
    <!-- A-Frame and Mind-AR libraries -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Outfit', sans-serif; background-color: #000; }
        
        /* Premium Loader */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-ring {
            width: 80px; height: 80px; border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%; border-top: 2px solid #6366f1;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI Control Panel */
        #ui-controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 100; width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 15px;
            pointer-events: none;
        }
        .glass-panel {
            background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(20px);
            border-radius: 24px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); color: white;
            pointer-events: auto; opacity: 0; transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel.show { opacity: 1; transform: translateY(0); }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .mode-btn {
            flex: 1; padding: 12px; border-radius: 12px; border: none;
            background: rgba(255, 255, 255, 0.1); color: white;
            font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .mode-btn.active { background: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); }

        /* Scanning HUD */
        #scan-hud {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 280px; height: 280px; pointer-events: none;
            transition: opacity 0.5s;
        }
        .corner {
            position: absolute; width: 40px; height: 40px;
            border: 3px solid #6366f1; border-radius: 10px;
        }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }
        
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: #6366f1;
            box-shadow: 0 0 15px #6366f1; top: 0;
            animation: scanMove 3s ease-in-out infinite;
        }
        @keyframes scanMove { 0%, 100% { top: 5%; } 50% { top: 95%; } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring"></div>
        <p style="margin-top: 20px; font-weight: 300; letter-spacing: 2px;">AR ENGINE READY</p>
    </div>

    <!-- Scanning HUD -->
    <div id="scan-hud">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="scan-line"></div>
    </div>

    <!-- UI Panel -->
    <div id="ui-controls">
        <div id="main-panel" class="glass-panel">
            <h3 style="margin: 0; font-weight: 700; color: #6366f1;">IMAGE RECOGNIZED</h3>
            <p style="margin: 8px 0; font-size: 0.9rem; opacity: 0.8;">Interactive tracking active. Select visualization mode below.</p>
            <div class="btn-group">
                <button id="btn-3d" class="mode-btn active">3D MODEL</button>
                <button id="btn-video" class="mode-btn">VIDEO PLAYER</button>
            </div>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/card.mind;" 
        color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="avatarModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/softbar/scene.gltf"></a-asset-item>
            <video id="arVideo" loop="true" crossorigin="anonymous" playsinline webkit-playsinline src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/portfolio/video.mp4"></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="target">
            <!-- 3D Mode Container -->
            <a-entity id="mode-3d">
                <a-entity 
                    gltf-model="#avatarModel" 
                    rotation="0 0 0" position="0 -0.2 0" scale="0.01 0.01 0.01" 
                    animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true">
                </a-entity>
                <a-entity 
                    text="value: VIRTUAL AVATAR; align: center; width: 4; font: https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"
                    position="0 0.8 0">
                </a-entity>
            </a-entity>

            <!-- Video Mode Container (Hidden initially) -->
            <a-entity id="mode-video" visible="false">
                <a-video src="#arVideo" width="1" height="0.55" position="0 0 0.1"></a-video>
                <a-entity 
                    text="value: PRODUCT SHOWCASE; align: center; width: 4; font: https://cdn.aframe.io/fonts/Aileron-Semibold.fnt"
                    position="0 0.4 0">
                </a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const target = document.querySelector('#target');
        const mainPanel = document.querySelector('#main-panel');
        const scanHud = document.querySelector('#scan-hud');
        const btn3d = document.querySelector('#btn-3d');
        const btnVideo = document.querySelector('#btn-video');
        const mode3d = document.querySelector('#mode-3d');
        const modeVideo = document.querySelector('#mode-video');
        const video = document.querySelector('#arVideo');

        // Target Interaction Logic
        target.addEventListener("targetFound", () => {
            mainPanel.classList.add('show');
            scanHud.style.opacity = '0';
            if (modeVideo.getAttribute('visible')) video.play();
        });

        target.addEventListener("targetLost", () => {
            mainPanel.classList.remove('show');
            scanHud.style.opacity = '1';
            video.pause();
        });

        // Mode Switching Logic
        btn3d.addEventListener('click', () => {
            btn3d.classList.add('active'); btnVideo.classList.remove('active');
            mode3d.setAttribute('visible', true); modeVideo.setAttribute('visible', false);
            video.pause();
        });

        btnVideo.addEventListener('click', () => {
            btnVideo.classList.add('active'); btn3d.classList.remove('active');
            mode3d.setAttribute('visible', false); modeVideo.setAttribute('visible', true);
            video.play();
        });

        // Hide Loader
        document.querySelector('a-scene').addEventListener("renderstart", () => {
            setTimeout(() => {
                document.querySelector('#loading-screen').style.opacity = '0';
                setTimeout(() => document.querySelector('#loading-screen').style.display = 'none', 800);
            }, 1000);
        });
    </script>
</body>
</html>
</body>
</html>
